services:
  db:
    image: postgres:16-alpine
    container_name: project-recipes-db-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=recipes_prod
      - POSTGRES_USER=postgresusr
      - POSTGRES_PASSWORD=postgrespwd
    volumes:
      - db-data-prod:/var/lib/postgresql/data
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-recipes-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-recipes-backend-prod
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - BACKEND_PORT=3001
      - DATABASE_URL=postgresql://postgresusr:postgrespwd@db:5432/recipes_prod?schema=public
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      - db

networks:
  app-network:
    driver: bridge

volumes:
  db-data-prod:
