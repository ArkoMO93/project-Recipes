services:
  db:
    image: postgres:16-alpine
    container_name: project-recipes-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=recipes_dev
      - POSTGRES_USER=postgresusr
      - POSTGRES_PASSWORD=postgrespwd
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: project-recipes-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    networks:
      - app-network
    restart: unless-stopped
    stdin_open: true
    tty: true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: project-recipes-backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - BACKEND_PORT=3001
      - DATABASE_URL=postgresql://postgresusr:postgrespwd@db:5432/recipes_dev?schema=public
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped
    stdin_open: true
    tty: true

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
